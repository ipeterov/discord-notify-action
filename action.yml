name: Discord Notify
description: Post and live-update a Discord card with per-job statuses for this workflow run.
branding:
  icon: message-circle
  color: purple
inputs:
  webhook:
    description: Discord webhook URL.
    required: true
  jobs:
    description: |
      Job ids to watch, in the same form `needs:` accepts.
      Examples:
        jobs: linters
        jobs: [linters, tests, deploy]
        jobs: |
          - linters
          - tests
          - deploy
    required: true
  github-token:
    description: |
      GitHub token used to read the workflow run and its jobs. Defaults to the
      job's `github.token`, which only needs `actions: read` permission.
    required: false
    default: ${{ github.token }}
runs:
  using: node24
  main: dist/index.js
